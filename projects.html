<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dự Án - Anh Phong</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .featured-project { display: flex; gap: 30px; margin-bottom: 50px; align-items: center; }
        .project-img-large { flex: 1; height: 300px; }
        .project-details { flex: 1; }
        .project-details table { width: 100%; border-collapse: collapse; }
        .project-details td { padding: 10px 0; border-bottom: 1px solid #eee; }
        .project-card { border: 1px solid #ccc; }
        .project-card .img { height: 180px; }
        .project-card .info { height: 60px; background: #fff; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Anh Phong</div>
        <nav><ul>... (giống như trên) ...</ul></nav>
        <div class="nav-icons"><span>🔍</span> <span>🛒</span></div>
    </header>

    <main class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">DỰ ÁN ĐÃ THỰC HIỆN</h2>
        <section class="featured-project">
            <div class="project-img-large placeholder-img"></div>
            <div class="project-details">
                <table>
                    <tr><td><strong>Khách hàng:</strong></td><td>Công ty SBC</td></tr>
                    <tr><td><strong>Vị trí:</strong></td><td>Reco 15 & Phát triển</td></tr>
                    <tr><td><strong>Công nghệ:</strong></td><td>React, Next, Nimmt CSS, Node.js</td></tr>
                </table>
            </div>
        </section>

        <section class="grid-3">
            <div class="project-card"><div class="img placeholder-img"></div><div class="info"></div></div>
            <div class="project-card"><div class="img placeholder-img"></div><div class="info"></div></div>
            <div class="project-card"><div class="img placeholder-img"></div><div class="info"></div></div>
        </section>
    </main>

    <footer>...</footer>
</body>
</html>
