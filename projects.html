<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự Án - Anh Phong</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #111;
            color: white;
        }

        /* HEADER */

        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid #333;
            background: #111;
        }

        .logo{
            color: white;
            text-decoration: none;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        nav ul{
            display: flex;
            gap: 30px;
            list-style: none;
        }

        nav ul li a{
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        nav ul li a:hover{
            color: #888;
        }

        .header-icons{
            display: flex;
            gap: 15px;
            font-size: 18px;
            cursor: pointer;
        }

        /* MAIN */

        main{
            width: 90%;
            margin: auto;
            padding: 60px 0;
        }

        .page-title{
            text-align: center;
            font-size: 42px;
            margin-bottom: 60px;
        }

        /* PROJECT GRID */

        .projects-grid{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 35px;
        }

        .project-card{
            background: #1a1a1a;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #2c2c2c;
            transition: 0.4s;
        }

        .project-card:hover{
            transform: translateY(-8px);
            border-color: #555;
        }

        .project-img img{
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .project-info{
            padding: 25px;
        }

        .project-info h3{
            margin-bottom: 10px;
            font-size: 24px;
        }

        .project-info p{
            color: #bbb;
            font-size: 15px;
        }

        /* FOOTER */

        footer{
            margin-top: 80px;
            padding: 30px 60px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-socials{
            margin-top: 10px;
            display: flex;
            gap: 15px;
        }

        .footer-socials a{
            color: white;
            font-size: 18px;
            transition: 0.3s;
        }

        .footer-socials a:hover{
            color: #888;
        }

        /* RESPONSIVE */

        @media(max-width: 768px){

            header{
                flex-direction: column;
                gap: 20px;
            }

            nav ul{
                flex-wrap: wrap;
                justify-content: center;
            }

            .projects-grid{
                grid-template-columns: 1fr;
            }

            footer{
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <header>

        <a href="index.html" class="logo">
            Anh Phong
        </a>

        <nav>

            <ul>

                <li>
                    <a href="index.html">
                        TRANG CHỦ
                    </a>
                </li>

                <li>
                    <a href="about.html">
                        VỀ CHÚNG TÔI
                    </a>
                </li>

                <li>
                    <a href="projects.html"
                    style="text-decoration: underline;">
                        DỰ ÁN
                    </a>
                </li>

                <li>
                    <a href="contact.html">
                        LIÊN HỆ
                    </a>
                </li>

            </ul>

        </nav>

        <div class="header-icons">

            <span>
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>

            <span>
                <i class="fa-solid fa-cart-shopping"></i>
            </span>

        </div>

    </header>

    <!-- MAIN -->

    <main>

        <h1 class="page-title">
            Dự Án Tiêu Biểu
        </h1>

        <div class="projects-grid">

            <!-- PROJECT 1 -->

            <div class="project-card">

                <div class="project-img">

                    <img src="https://mir-s3-cdn-cf.behance.net/project_modules/max_3840/97f37e195585685.660ff0bf6904d.jpg"
                    alt="Nội thất A">

                </div>

                <div class="project-info">

                    <h3>
                        Thiết Kế Nội Thất A
                    </h3>

                    <p>
                        Hồ Chí Minh — 2026
                    </p>

                </div>

            </div>

            <!-- PROJECT 2 -->

            <div class="project-card">

                <div class="project-img">

                    <img src="https://agjsc.vn/images/news/2025/12/10/279112483-5364771053533670-8991763568916266671-n-402.jpg"
                    alt="Biệt thự B">

                </div>

                <div class="project-info">

                    <h3>
                        Cải Tạo Biệt Thự B
                    </h3>

                    <p>
                        Hồ Chí Minh — 2026
                    </p>

                </div>

            </div>

            <!-- PROJECT 3 -->

            <div class="project-card">

                <div class="project-img">

                    <img src="https://lockernlock.vn/wp-content/uploads/2023/07/13.-trang-tri-phong-khach-can-ho.png"
                    alt="Decor C">

                </div>

                <div class="project-info">

                    <h3>
                        Decor Căn Hộ C
                    </h3>

                    <p>
                        Hà Nội — 2025
                    </p>

                </div>

            </div>


            <div class="project-card">

                <div class="project-img">

                    <img src="https://mjnstudio.com/wp-content/uploads/2025/06/thiet-ke-studio-chup-anh-1.jpeg"
                    alt="Studio D">

                </div>

                <div class="project-info">

                    <h3>

                    </h3>

        </div>

    </main>


    <footer>

                </a>

                </a>

                <a href="mailto:yourgmail@gmail.com">

                </a>

                <a href="#">
                    <i class="fab fa-behance"></i>
                </a>

            </div>

        </div>

        <div class="footer-right">
            <span>© 2026 Anh Phong</span>
        </div>

    </footer>

</body>

</html>
