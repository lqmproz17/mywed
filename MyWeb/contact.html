<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #111;
            color: white;
        }

        /* HEADER */

        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid #333;
            background: #111;
        }

        .logo{
            color: white;
            text-decoration: none;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        nav ul{
            display: flex;
            gap: 30px;
            list-style: none;
        }

        nav ul li a{
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        nav ul li a:hover{
            color: #888;
        }

        .header-icons{
            display: flex;
            gap: 15px;
            font-size: 18px;
            cursor: pointer;
        }

        /* MAIN */

        main{
            width: 90%;
            margin: auto;
            padding: 60px 0;
        }

        .page-title{
            text-align: center;
            font-size: 42px;
            margin-bottom: 60px;
        }

        /* CONTACT */

        .contact-container{
            display: flex;
            gap: 40px;
        }

        .contact-form,
        .contact-info{
            flex: 1;
            background: #1a1a1a;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #2d2d2d;
        }

        .contact-form input,
        .contact-form textarea{
            width: 100%;
            margin-bottom: 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #222;
            color: white;
            font-size: 15px;
        }

        .contact-form input:focus,
        .contact-form textarea:focus{
            outline: 1px solid #666;
        }

        .btn-submit{
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: white;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover{
            background: #888;
            color: white;
        }

        /* CONTACT INFO */

        .contact-info h3{
            margin-bottom: 20px;
            font-size: 24px;
        }

        .info-item{
            margin-bottom: 18px;
            color: #ccc;
            font-size: 15px;
        }

        .map-box{
            margin-top: 20px;
            height: 250px;
            border-radius: 15px;
            overflow: hidden;
        }

        .map-box iframe{
            width: 100%;
            height: 100%;
            border: none;
        }

        /* FAQ BUTTON */

        .faq-section{
            text-align: center;
            margin-top: 60px;
        }

        .faq-btn{
            display: inline-block;
            padding: 15px 35px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.3s;
        }

        .faq-btn:hover{
            background: #888;
            color: white;
        }

        /* FOOTER */

        footer{
            margin-top: 80px;
            padding: 30px 60px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-socials{
            margin-top: 10px;
            display: flex;
            gap: 15px;
        }

        .footer-socials a{
            color: white;
            font-size: 18px;
            transition: 0.3s;
        }

        .footer-socials a:hover{
            color: #888;
        }

        /* RESPONSIVE */

        @media(max-width: 768px){

            header{
                flex-direction: column;
                gap: 20px;
            }

            nav ul{
                flex-wrap: wrap;
                justify-content: center;
            }

            .contact-container{
                flex-direction: column;
            }

            footer{
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <header>

        <a href="index.html" class="logo">
            Anh Phong
        </a>

        <nav>

            <ul>

                <li>
                    <a href="index.html">
                        TRANG CHỦ
                    </a>
                </li>

                <li>
                    <a href="about.html">
                        VỀ CHÚNG TÔI
                    </a>
                </li>

                <li>
                    <a href="projects.html">
                        DỰ ÁN
                    </a>
                </li>

                <li>
                    <a href="contact.html"
                    style="text-decoration: underline;">
                        LIÊN HỆ
                    </a>
                </li>

            </ul>

        </nav>

        <div class="header-icons">

            <span>
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>

            <span>
                <i class="fa-solid fa-cart-shopping"></i>
            </span>

        </div>

    </header>

    <!-- MAIN -->

    <main>

        <h1 class="page-title">
            LIÊN HỆ VỚI CHÚNG TÔI
        </h1>

        <div class="contact-container">

            <!-- CONTACT FORM -->

            <div class="contact-form">

                <input type="text"
                placeholder="Họ và tên">

                <input type="email"
                placeholder="Email">

                <textarea rows="6"
                placeholder="Lời nhắn"></textarea>

                <button class="btn-submit">
                    GỬI YÊU CẦU
                </button>

            </div>

            <!-- CONTACT INFO -->

            <div class="contact-info">

                <h3>
                    Thông tin liên hệ
                </h3>

                <div class="info-item">
                    📍 122 Nguyễn Văn Linh, Quận 7, TP Hồ Chí Minh
                </div>

                <div class="info-item">
                    📞 Hotline: 1900 1224
                </div>

                <div class="info-item">
                    ✉️ Email: anhphonginterior@gmail.com
                </div>

                <h3 style="margin-top: 35px;">
                    Google Maps
                </h3>

                <div class="map-box">

                    <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.6379845443275!2d106.70098057574632!3d10.762622089385424!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f3b2c1a5c61%3A0x4f0d4d54f0f0f0f!2zSOG7kyBDaMOtIE1pbmg!5e0!3m2!1svi!2s!4v1710000000000!5m2!1svi!2s"
                    allowfullscreen=""
                    loading="lazy">
                    </iframe>

                </div>

            </div>

        </div>

        <!-- FAQ BUTTON -->

        <div class="faq-section">

            <a href="faqs.html" class="faq-btn">
                FAQS
            </a>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>

        <div class="footer-left">

            <p>Liên hệ với chúng tôi:</p>

            <div class="footer-socials">

                <a href="#">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="#">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="mailto:anhphonginterior@gmail.com">
                    <i class="fas fa-envelope"></i>
                </a>

                <a href="#">
                    <i class="fab fa-behance"></i>
                </a>

            </div>

        </div>

        <div class="footer-right">

            <span>© 2026 Anh Phong</span>

        </div>

    </footer>

</body>

</html>
