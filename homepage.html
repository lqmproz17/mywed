<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anh Phong - Trang Chủ</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #111;
            color: white;
        }

        /* HEADER */

        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid #333;
            background: #111;
        }

        .logo{
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        nav ul{
            display: flex;
            gap: 30px;
            list-style: none;
        }

        nav ul li a{
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        nav ul li a:hover{
            color: #999;
        }

        .nav-icons{
            display: flex;
            gap: 15px;
            font-size: 18px;
            cursor: pointer;
        }

        /* MAIN */

        .container{
            width: 90%;
            margin: auto;
            padding: 40px 0;
        }

        /* HERO */

        .hero{
            margin-bottom: 40px;
        }

        .hero img{
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 15px;
        }

        /* GRID */

        .grid-3{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .feature-box{
            overflow: hidden;
            border-radius: 15px;
        }

        .feature-box img{
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: 0.4s;
        }

        .feature-box img:hover{
            transform: scale(1.05);
        }


        .scroll-down{
            text-align: center;
            margin-top: 50px;
            color: #aaa;
        }

        .scroll-down i{
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* FOOTER */

        footer{
            margin-top: 60px;
            padding: 30px 60px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-socials{
            margin-top: 10px;
            display: flex;
            gap: 15px;
        }

        .footer-socials a{
            color: white;
            font-size: 18px;
            transition: 0.3s;
        }

        .footer-socials a:hover{
            color: #888;
        }


        @media(max-width: 768px){

            header{
                flex-direction: column;
                gap: 20px;
            }

            nav ul{
                flex-wrap: wrap;
                justify-content: center;
            }

            .grid-3{
                grid-template-columns: 1fr;
            }

            .hero img{
                height: 300px;
            }

            footer{
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

        }

    </style>

</head>

<body>


    <header>

        <div class="logo">Anh Phong</div>

        <nav>
            <ul>
                <li>
                    <a href="index.html" style="text-decoration: underline;">
                        TRANG CHỦ
                    </a>
                </li>

                <li>
                    <a href="about.html">
                        VỀ CHÚNG TÔI
                    </a>
                </li>

                <li>
                    <a href="projects.html">
                        DỰ ÁN
                    </a>
                </li>

                <li>
                    <a href="contact.html">
                        LIÊN HỆ
                    </a>
                </li>
            </ul>
        </nav>

        <div class="nav-icons">
            <span><i class="fa-solid fa-magnifying-glass"></i></span>
            <span><i class="fa-solid fa-cart-shopping"></i></span>
        </div>

    </header>


    <main class="container">


        <section class="hero">

            <!-- Đổi tên ảnh thành banner.jpg -->
            <img src="https://scontent.fcxr1-1.fna.fbcdn.net/v/t1.6435-9/186528900_324214585720307_7346515625096027727_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=127cfc&_nc_ohc=98OrZ23KLEMQ7kNvwEQDOMR&_nc_oc=Adr18U4aSu_isw1egGOdnUaerh204MVhhUjDXL1SnCbZOO6vvoZAmj1nE3J_4Dmiul0&_nc_zt=23&_nc_ht=scontent.fcxr1-1.fna&_nc_gid=c35ZNXKNHsjjQA96VTcdRA&_nc_ss=7b289&oh=00_Af5Vu2EQY8WLmWru4MQEv-EnxCU78jXmNXhKoZFAlgiGOg&oe=6A2BBCC5" alt="Banner Nội Thất">

        </section>


        <section class="grid-3">

            <div class="feature-box">
                <img src="https://i.pinimg.com/originals/6d/cd/98/6dcd9805189974f10b93a121bcb4ca69.jpg"
                alt="Decor 1">
            </div>

            <div class="feature-box">
                <img src="https://storage.googleapis.com/digital-platform/hinh_anh_Tong_hop_mau_noi_that_phong_khach_bang_go_dep_sang_trong_so_1_67e2ecc96a/hinh_anh_Tong_hop_mau_noi_that_phong_khach_bang_go_dep_sang_trong_so_1_67e2ecc96a.jpg"
                alt="Decor 2">
            </div>

            <div class="feature-box">
                <img src="https://noithatngahung.com/wp-content/uploads/2021/03/nh%E1%BB%8F-xinh-3271x2181.jpg"
                alt="Decor 3">
            </div>

        </section>

        <!-- SCROLL -->

        <div class="scroll-down">

            <div>
                <i class="fa-solid fa-computer-mouse"></i>
            </div>

            <p>Cuộn để khám phá</p>

        </div>

    </main>


    <footer>

        <div class="footer-left">

            <p>Liên hệ với chúng tôi:</p>

            <div class="footer-socials">

                <a href="#">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="#">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="mailto:yourgmail@gmail.com">
                    <i class="fas fa-envelope"></i>
                </a>

                <a href="#">
                    <i class="fab fa-behance"></i>
                </a>

            </div>

        </div>

        <div class="footer-right">
            <span>© 2026 Anh Phong</span>
        </div>

    </footer>

</body>
</html>
